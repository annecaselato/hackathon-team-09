name: Lint Markdown and Spec Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    paths:
      - "**/*.md"
      - "02-spec-moderna/**"
      - "docs/**"

permissions:
  contents: read

jobs:
  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            **/*.md
            !node_modules
            !prototype/backend/target
            !prototype/frontend/.next

  spec-traceability:
    name: REQ-ID traceability check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate REQ traceability against implementation
        run: |
          set -e
          if [ -d "02-spec-moderna" ]; then
            echo "Checking REQ-ID traceability across 02-spec-moderna and prototype code..."
            grep -rE "REQ-[A-Z]+-[0-9]+" 02-spec-moderna -h | grep -oE "REQ-[A-Z]+-[0-9]+" | sort -u > /tmp/reqs-spec.txt || true
            grep -rE "REQ-[A-Z]+-[0-9]+" prototype/backend prototype/frontend 2>/dev/null | grep -oE "REQ-[A-Z]+-[0-9]+" | sort -u > /tmp/reqs-code.txt || true
            comm -23 /tmp/reqs-spec.txt /tmp/reqs-code.txt > /tmp/missing.txt || true
            if [ -s /tmp/missing.txt ]; then
              echo "::warning::REQ-IDs declarados na especificação sem referência em código:"
              cat /tmp/missing.txt
            else
              echo "All REQ-IDs are traced."
            fi
          else
            echo "No 02-spec-moderna directory found. Skipping traceability check."
          fi
